<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Records</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#fff0f6;
    color:#5a2a3a;
}

/* NAVBAR */

header{
    background:#ffb6c1;
    padding:15px 40px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:#5a2a3a;
    font-weight:bold;
}

nav a:hover{
    color:#ff4f81;
}

main{
    padding:40px;
}

.card{
    background:#ffd6e7;
    padding:30px;
    border-radius:10px;
    max-width:800px;
    margin:auto;
    margin-bottom:30px;
    box-shadow:0 0 10px rgba(255,105,180,0.3);
}

.upload-box{
    border:2px dashed #ff4f81;
    padding:30px;
    text-align:center;
    border-radius:10px;
    margin-top:15px;
}

button{
    margin-top:10px;
    padding:8px 20px;
    background:#ff4f81;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff2f6d;
}

/* ACTIVITY LIST */

.activity{
    background:#ffc1d6;
    padding:15px;
    margin-top:10px;
    border-radius:8px;
}

</style>
</head>

<body>

<header>
<nav>

<h2>My Portfolio</h2>

<ul>
<li><a href="musubi.html">Home</a></li>
</ul>

</nav>
</header>

<main>

<!-- QUIZZES -->

<div class="card">

<h2> Quizzes</h2>

<div class="upload-box">
<p>Upload your quiz</p>
<input type="file">
<br>
<button>Upload Quiz</button>
</div>

</div>

<!-- EXAMS -->

<div class="card">

<h2>Exams</h2>

<div class="upload-box">
<p>Upload your exam</p>
<input type="file">
<br>
<button>Upload Exam</button>
</div>

</div>

<!-- ACTIVITIES -->

<div class="card">

<h2> Activities</h2>

<div class="activity">Activity 1 - </div>
<div class="activity">Activity 2 - </div>
<div class="activity">Activity 3 - </div>
<div class="activity">Activity 4 - </div>

</div>

</main>

</body>
</html>
